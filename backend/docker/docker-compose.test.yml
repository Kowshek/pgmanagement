version: '3.8'

services:
  postgres-test:
    image: postgres:16
    container_name: pg_manager_postgres_test
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pgmanager_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pgmanager_test"]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  redis-test:
    image: redis:7
    container_name: pg_manager_redis_test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped
