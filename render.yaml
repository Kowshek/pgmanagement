services:
  - type: web
    name: pgmanagement-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/docker/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: REDIS_URL
        sync: false
      - key: CORS_EXTRA_ORIGINS
        sync: false
